services:
  mcharbor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ${MCHARBOR_IMAGE:-ghcr.io/therealmcsparrow/mcharbor}:${MCHARBOR_TAG:-1.2.1}
    restart: unless-stopped
    ports:
      - "8705:5474"
    environment:
      - LOG_LEVEL=info
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - mcharbor-data:/app/data

  agent:
    profiles: ["agent"]
    image: ${MCHARBOR_AGENT_IMAGE:-ghcr.io/therealmcsparrow/mcharbor-agent}:${MCHARBOR_AGENT_TAG:-1.2.1}
    restart: unless-stopped
    environment:
      - MCHARBOR_URL=${MCHARBOR_URL:-}
      - MCHARBOR_AGENT_TOKEN=${MCHARBOR_AGENT_TOKEN:-}
      - DOCKER_HOST=${MCHARBOR_AGENT_DOCKER_HOST:-unix:///var/run/docker.sock}
      - LOG_LEVEL=${MCHARBOR_AGENT_LOG_LEVEL:-info}
      - MCHARBOR_INSECURE=${MCHARBOR_AGENT_INSECURE:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  mcharbor-data:
