x-mcharbor:
  name: mariadb
  title: MariaDB
  description: Community-developed fork of MySQL with enhanced performance and additional features.
  category: database
  icon: database
  website: https://mariadb.org
  tags: [database, sql, relational, mariadb, mysql]
  author: McHarbor
  version: "1.0"
  variables:
    - name: DB_PORT
      label: Database Port
      type: port
      default: "3306"
      required: true
    - name: MYSQL_ROOT_PASSWORD
      label: Root Password
      type: password
      required: true
    - name: MYSQL_DATABASE
      label: Database Name
      type: string
      default: mydb
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/mariadb

services:
  mariadb:
    image: mariadb:11
    container_name: mariadb
    restart: unless-stopped
    ports:
      - "{{DB_PORT}}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "{{MYSQL_ROOT_PASSWORD}}"
      MYSQL_DATABASE: "{{MYSQL_DATABASE}}"
    volumes:
      - "{{DATA_PATH}}:/var/lib/mysql"
