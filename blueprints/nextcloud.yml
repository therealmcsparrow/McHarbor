x-mcharbor:
  name: nextcloud
  title: Nextcloud
  description: Self-hosted productivity platform with file sync, calendar, contacts, and collaboration tools.
  category: productivity
  icon: cloud
  website: https://nextcloud.com
  tags: [cloud, files, sync, productivity, office]
  author: McHarbor
  version: "1.0"
  variables:
    - name: NEXTCLOUD_PORT
      label: Web Port
      type: port
      default: "8080"
      required: true
    - name: MYSQL_ROOT_PASSWORD
      label: MySQL Root Password
      type: password
      required: true
      placeholder: "Strong password for MySQL root"
    - name: MYSQL_PASSWORD
      label: MySQL Password
      type: password
      required: true
      placeholder: "Password for Nextcloud database user"
    - name: NEXTCLOUD_ADMIN_USER
      label: Admin Username
      type: string
      default: admin
      required: true
    - name: NEXTCLOUD_ADMIN_PASSWORD
      label: Admin Password
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/nextcloud
      required: true

services:
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "{{NEXTCLOUD_PORT}}:80"
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: "{{MYSQL_PASSWORD}}"
      NEXTCLOUD_ADMIN_USER: "{{NEXTCLOUD_ADMIN_USER}}"
      NEXTCLOUD_ADMIN_PASSWORD: "{{NEXTCLOUD_ADMIN_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/html:/var/www/html"
    depends_on:
      - nextcloud-db

  nextcloud-db:
    image: mariadb:11
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "{{MYSQL_ROOT_PASSWORD}}"
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: "{{MYSQL_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/db:/var/lib/mysql"
