x-mcharbor:
  name: grafana-prometheus
  title: Grafana + Prometheus
  description: Full monitoring stack with Grafana dashboards and Prometheus metrics collection.
  category: monitoring
  icon: bar-chart-2
  website: https://grafana.com
  tags: [monitoring, metrics, dashboards, alerting]
  author: McHarbor
  version: "1.0"
  variables:
    - name: GRAFANA_PORT
      label: Grafana Port
      type: port
      default: "3000"
      required: true
    - name: PROMETHEUS_PORT
      label: Prometheus Port
      type: port
      default: "9090"
    - name: GF_ADMIN_PASSWORD
      label: Grafana Admin Password
      type: password
      default: admin
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/monitoring

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "{{GRAFANA_PORT}}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "{{GF_ADMIN_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/grafana:/var/lib/grafana"
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "{{PROMETHEUS_PORT}}:9090"
    volumes:
      - "{{DATA_PATH}}/prometheus:/prometheus"
