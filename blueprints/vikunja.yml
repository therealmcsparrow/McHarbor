x-mcharbor:
  name: vikunja
  title: Vikunja
  description: Open-source task management and to-do list app with kanban boards, calendars, and team collaboration.
  category: productivity
  icon: checklist
  website: https://vikunja.io
  tags: [tasks, todo, kanban, project-management, productivity]
  author: McHarbor
  version: "1.0"
  variables:
    - name: HTTP_PORT
      label: HTTP Port
      type: port
      default: "3456"
      required: true
    - name: DB_PASSWORD
      label: Database Password
      type: password
      required: true
    - name: JWT_SECRET
      label: JWT Secret
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/vikunja

services:
  vikunja:
    image: vikunja/vikunja:latest
    container_name: vikunja
    restart: unless-stopped
    ports:
      - "{{HTTP_PORT}}:3456"
    environment:
      VIKUNJA_DATABASE_TYPE: postgres
      VIKUNJA_DATABASE_HOST: vikunja-db
      VIKUNJA_DATABASE_DATABASE: vikunja
      VIKUNJA_DATABASE_USER: vikunja
      VIKUNJA_DATABASE_PASSWORD: "{{DB_PASSWORD}}"
      VIKUNJA_SERVICE_JWTSECRET: "{{JWT_SECRET}}"
      VIKUNJA_SERVICE_FRONTENDURL: "http://localhost:{{HTTP_PORT}}/"
    volumes:
      - "{{DATA_PATH}}/files:/app/vikunja/files"
    depends_on:
      vikunja-db:
        condition: service_healthy

  vikunja-db:
    image: postgres:16-alpine
    container_name: vikunja-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vikunja
      POSTGRES_USER: vikunja
      POSTGRES_PASSWORD: "{{DB_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/db:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vikunja"]
      interval: 10s
      timeout: 5s
      retries: 5
