x-mcharbor:
  name: plex
  title: Plex Media Server
  description: Stream your media collection anywhere. Organize movies, TV shows, music, and photos.
  category: media
  icon: play
  website: https://plex.tv
  tags: [media, streaming, movies, tv, music]
  author: McHarbor
  version: "1.0"
  variables:
    - name: PLEX_PORT
      label: Web Port
      type: port
      default: "32400"
      required: true
    - name: PLEX_CLAIM
      label: Plex Claim Token
      type: string
      placeholder: "Get from https://plex.tv/claim"
    - name: MEDIA_PATH
      label: Media Directory
      type: path
      default: ./data/plex/media
      required: true
    - name: DATA_PATH
      label: Config Directory
      type: path
      default: ./data/plex/config

services:
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: UTC
      PLEX_CLAIM: "{{PLEX_CLAIM}}"
    volumes:
      - "{{DATA_PATH}}:/config"
      - "{{MEDIA_PATH}}:/data"
