x-mcharbor:
  name: nginx-proxy-manager
  title: Nginx Proxy Manager
  description: Easy-to-use reverse proxy with SSL termination and a beautiful web UI.
  category: networking
  icon: globe
  website: https://nginxproxymanager.com
  tags: [proxy, ssl, reverse-proxy, nginx, letsencrypt]
  author: McHarbor
  version: "1.0"
  variables:
    - name: HTTP_PORT
      label: HTTP Port
      type: port
      default: "80"
      required: true
    - name: HTTPS_PORT
      label: HTTPS Port
      type: port
      default: "443"
    - name: ADMIN_PORT
      label: Admin Port
      type: port
      default: "81"
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/npm

services:
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "{{HTTP_PORT}}:80"
      - "{{HTTPS_PORT}}:443"
      - "{{ADMIN_PORT}}:81"
    volumes:
      - "{{DATA_PATH}}/data:/data"
      - "{{DATA_PATH}}/letsencrypt:/etc/letsencrypt"
