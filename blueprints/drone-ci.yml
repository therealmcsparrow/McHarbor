x-mcharbor:
  name: drone-ci
  title: Drone CI
  description: Lightweight continuous integration platform with Docker-native pipeline execution.
  category: development
  icon: rocket
  website: https://drone.io
  tags: [ci, cd, automation, pipeline, devops]
  author: McHarbor
  version: "1.0"
  variables:
    - name: WEB_PORT
      label: Web Port
      type: port
      default: "8080"
      required: true
    - name: DRONE_SERVER_HOST
      label: Server Host
      type: string
      required: true
      placeholder: "drone.example.com"
    - name: DRONE_RPC_SECRET
      label: RPC Secret
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/drone

services:
  drone:
    image: drone/drone:latest
    container_name: drone
    restart: unless-stopped
    ports:
      - "{{WEB_PORT}}:80"
    environment:
      DRONE_SERVER_HOST: "{{DRONE_SERVER_HOST}}"
      DRONE_SERVER_PROTO: http
      DRONE_RPC_SECRET: "{{DRONE_RPC_SECRET}}"
    volumes:
      - "{{DATA_PATH}}:/data"

  drone-runner:
    image: drone/drone-runner-docker:latest
    container_name: drone-runner
    restart: unless-stopped
    environment:
      DRONE_RPC_HOST: drone
      DRONE_RPC_PROTO: http
      DRONE_RPC_SECRET: "{{DRONE_RPC_SECRET}}"
      DRONE_RUNNER_CAPACITY: "2"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - drone
