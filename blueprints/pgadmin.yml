x-mcharbor:
  name: pgadmin
  title: pgAdmin
  description: Feature-rich web-based administration tool for PostgreSQL databases.
  category: development
  icon: database
  website: https://www.pgadmin.org
  tags: [database, postgresql, admin, development, sql]
  author: McHarbor
  version: "1.0"
  variables:
    - name: HTTP_PORT
      label: HTTP Port
      type: port
      default: "5050"
      required: true
    - name: DEFAULT_EMAIL
      label: Admin Email
      type: string
      default: admin@example.com
      required: true
    - name: DEFAULT_PASSWORD
      label: Admin Password
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/pgadmin

services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: unless-stopped
    ports:
      - "{{HTTP_PORT}}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: "{{DEFAULT_EMAIL}}"
      PGADMIN_DEFAULT_PASSWORD: "{{DEFAULT_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}:/var/lib/pgadmin"
