x-mcharbor:
  name: filebrowser
  title: File Browser
  description: Web-based file manager with a clean interface for browsing, uploading, and editing files.
  category: storage
  icon: folder
  website: https://filebrowser.org
  tags: [files, storage, file-manager, web]
  author: McHarbor
  version: "1.0"
  variables:
    - name: WEB_PORT
      label: Web Port
      type: port
      default: "8080"
      required: true
    - name: FILES_PATH
      label: Files Directory
      type: path
      default: ./data/filebrowser/files
      required: true
    - name: DATA_PATH
      label: Config Directory
      type: path
      default: ./data/filebrowser

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    ports:
      - "{{WEB_PORT}}:80"
    volumes:
      - "{{FILES_PATH}}:/srv"
      - "{{DATA_PATH}}/database.db:/database.db"
