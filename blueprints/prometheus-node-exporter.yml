x-mcharbor:
  name: prometheus-node-exporter
  title: Node Exporter
  description: Prometheus exporter for hardware and OS metrics. CPU, memory, disk, and network stats.
  category: monitoring
  icon: cpu
  website: https://prometheus.io
  tags: [monitoring, metrics, prometheus, system]
  author: McHarbor
  version: "1.0"
  variables:
    - name: METRICS_PORT
      label: Metrics Port
      type: port
      default: "9100"
      required: true

services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "{{METRICS_PORT}}:9100"
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
