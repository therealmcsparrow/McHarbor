x-mcharbor:
  name: umami
  title: Umami
  description: Privacy-focused, open-source web analytics alternative to Google Analytics.
  category: web
  icon: chart-line
  website: https://umami.is
  tags: [analytics, web, privacy, statistics, tracking]
  author: McHarbor
  version: "1.0"
  variables:
    - name: HTTP_PORT
      label: HTTP Port
      type: port
      default: "3000"
      required: true
    - name: DB_PASSWORD
      label: Database Password
      type: password
      required: true
    - name: APP_SECRET
      label: App Secret
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/umami

services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    restart: unless-stopped
    ports:
      - "{{HTTP_PORT}}:3000"
    environment:
      DATABASE_URL: postgresql://umami:{{DB_PASSWORD}}@umami-db:5432/umami
      APP_SECRET: "{{APP_SECRET}}"
    depends_on:
      umami-db:
        condition: service_healthy

  umami-db:
    image: postgres:16-alpine
    container_name: umami-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: "{{DB_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/db:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
