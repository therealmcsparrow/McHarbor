x-mcharbor:
  name: wordpress
  title: WordPress
  description: Popular content management system for blogs, websites, and online stores.
  category: productivity
  icon: globe
  website: https://wordpress.org
  tags: [cms, blog, website, php]
  author: McHarbor
  version: "1.0"
  variables:
    - name: WEB_PORT
      label: Web Port
      type: port
      default: "8080"
      required: true
    - name: MYSQL_ROOT_PASSWORD
      label: MySQL Root Password
      type: password
      required: true
    - name: MYSQL_PASSWORD
      label: MySQL Password
      type: password
      required: true
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/wordpress

services:
  wordpress:
    image: wordpress:latest
    container_name: wordpress
    restart: unless-stopped
    ports:
      - "{{WEB_PORT}}:80"
    environment:
      WORDPRESS_DB_HOST: wordpress-db
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: "{{MYSQL_PASSWORD}}"
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - "{{DATA_PATH}}/html:/var/www/html"
    depends_on:
      - wordpress-db

  wordpress-db:
    image: mariadb:11
    container_name: wordpress-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "{{MYSQL_ROOT_PASSWORD}}"
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: "{{MYSQL_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/db:/var/lib/mysql"
