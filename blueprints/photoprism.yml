x-mcharbor:
  name: photoprism
  title: PhotoPrism
  description: AI-powered photo management app with automatic tagging, face recognition, and powerful search.
  category: media
  icon: photo
  website: https://photoprism.app
  tags: [photos, gallery, ai, media, images]
  author: McHarbor
  version: "1.0"
  variables:
    - name: HTTP_PORT
      label: HTTP Port
      type: port
      default: "2342"
      required: true
    - name: ADMIN_PASSWORD
      label: Admin Password
      type: password
      required: true
    - name: DB_PASSWORD
      label: Database Password
      type: password
      required: true
    - name: PHOTOS_PATH
      label: Photos Directory
      type: path
      default: ./data/photoprism/photos
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/photoprism

services:
  photoprism:
    image: photoprism/photoprism:latest
    container_name: photoprism
    restart: unless-stopped
    ports:
      - "{{HTTP_PORT}}:2342"
    environment:
      PHOTOPRISM_ADMIN_USER: admin
      PHOTOPRISM_ADMIN_PASSWORD: "{{ADMIN_PASSWORD}}"
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: gzip
      PHOTOPRISM_DATABASE_DRIVER: mysql
      PHOTOPRISM_DATABASE_SERVER: photoprism-db:3306
      PHOTOPRISM_DATABASE_NAME: photoprism
      PHOTOPRISM_DATABASE_USER: photoprism
      PHOTOPRISM_DATABASE_PASSWORD: "{{DB_PASSWORD}}"
      PHOTOPRISM_SITE_CAPTION: "AI-Powered Photos App"
    volumes:
      - "{{PHOTOS_PATH}}:/photoprism/originals"
      - "{{DATA_PATH}}/storage:/photoprism/storage"
    depends_on:
      photoprism-db:
        condition: service_healthy

  photoprism-db:
    image: mariadb:11
    container_name: photoprism-db
    restart: unless-stopped
    command: --innodb-buffer-pool-size=512M --transaction-isolation=READ-COMMITTED --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_DATABASE: photoprism
      MARIADB_USER: photoprism
      MARIADB_PASSWORD: "{{DB_PASSWORD}}"
      MARIADB_ROOT_PASSWORD: "{{DB_PASSWORD}}"
    volumes:
      - "{{DATA_PATH}}/db:/var/lib/mysql"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
