x-mcharbor:
  name: stirling-pdf
  title: Stirling PDF
  description: Self-hosted PDF manipulation tool. Merge, split, convert, and OCR PDF files.
  category: productivity
  icon: file-text
  website: https://github.com/Stirling-Tools/Stirling-PDF
  tags: [pdf, documents, tools, conversion]
  author: McHarbor
  version: "1.0"
  variables:
    - name: WEB_PORT
      label: Web Port
      type: port
      default: "8080"
      required: true

services:
  stirling-pdf:
    image: frooodle/s-pdf:latest
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "{{WEB_PORT}}:8080"
