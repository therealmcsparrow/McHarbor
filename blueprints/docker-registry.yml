x-mcharbor:
  name: docker-registry
  title: Docker Registry
  description: Private Docker image registry with web UI for browsing and managing images.
  category: development
  icon: package
  website: https://docs.docker.com/registry
  tags: [docker, registry, images, container, ci-cd]
  author: McHarbor
  version: "1.0"
  variables:
    - name: REGISTRY_PORT
      label: Registry Port
      type: port
      default: "5000"
      required: true
    - name: UI_PORT
      label: UI Port
      type: port
      default: "8080"
    - name: DATA_PATH
      label: Data Directory
      type: path
      default: ./data/registry

services:
  registry:
    image: registry:2
    container_name: docker-registry
    restart: unless-stopped
    ports:
      - "{{REGISTRY_PORT}}:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - "{{DATA_PATH}}:/var/lib/registry"

  registry-ui:
    image: joxit/docker-registry-ui:latest
    container_name: registry-ui
    restart: unless-stopped
    ports:
      - "{{UI_PORT}}:80"
    environment:
      REGISTRY_TITLE: "McHarbor Registry"
      REGISTRY_URL: "http://registry:5000"
      DELETE_IMAGES: "true"
      SINGLE_REGISTRY: "true"
    depends_on:
      - registry
